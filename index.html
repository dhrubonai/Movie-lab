<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamLite</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#000;
  color:#0f0;
}

header {
  text-align:center;
  padding:15px;
  font-size:22px;
  border-bottom:2px solid #0f0;
}

.container {
  padding:10px;
  max-width:700px;
  margin:auto;
}

input {
  width:70%;
  padding:10px;
  background:#000;
  color:#0f0;
  border:2px solid #0f0;
}

button {
  padding:10px;
  background:#000;
  color:#0f0;
  border:2px solid #0f0;
  cursor:pointer;
}

button:hover {
  background:#0f0;
  color:#000;
}

.card {
  margin:8px 0;
}

/* PLAYER PAGE */
.playerPage {
  max-width:900px;
  margin:auto;
  padding:10px;
}

.playerBox {
  border:2px solid #0f0;
  position:relative;
}

iframe {
  width:100%;
  height:420px;
  border:none;
}

/* overlay */
#overlay {
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.01);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

/* TV controls */
.controls {
  margin-top:10px;
  display:flex;
  gap:6px;
}

select {
  flex:1;
  padding:8px;
  background:#000;
  color:#0f0;
  border:2px solid #0f0;
}
</style>
</head>

<body>

<header>🎬 StreamLite</header>

<div id="app"></div>

<script>
let currentId="";
let currentType="movie";
let episodesData={};
let lastSource="";

/* BLOCK POPUPS */
window.open = () => null;

/* ROUTER */
const params = new URLSearchParams(location.search);
const watchId = params.get("watch");

if(watchId){
  loadPlayer(watchId);
}else{
  loadHome();
}

/* HOME */
function loadHome(){
  document.getElementById("app").innerHTML = `
    <div class="container">
      <input id="searchInput" placeholder="Search movie or series">
      <button onclick="search()">Search</button>
      <div id="results"></div>
    </div>
  `;
}

/* SEARCH */
async function search(){
  const q=document.getElementById("searchInput").value.trim();
  if(!q) return;

  const res=await fetch(
    "https://v2.sg.media-imdb.com/suggestion/" +
    q[0].toLowerCase() + "/" + q + ".json"
  );

  const data=await res.json();

  const results=document.getElementById("results");
  results.innerHTML="";

  (data.d||[]).forEach(item=>{
    if(!item.id) return;

    results.innerHTML += `
      <div class="card">
        <button onclick="location.href='?watch=${item.id}'">
          ▶ ${item.l}
        </button>
      </div>
    `;
  });
}

/* PLAYER PAGE */
async function loadPlayer(id){
  currentId=id;

  document.getElementById("app").innerHTML = `
    <div class="playerPage">

      <button onclick="goHome()">⏪ Back</button>

      <h3 id="title">Loading...</h3>

      <div class="playerBox">
        <div id="overlay" onclick="removeOverlay()">
          ▶ Tap to enable player
        </div>
        <iframe id="player" allowfullscreen></iframe>
      </div>

      <div id="tvControls" class="controls" style="display:none;">
        <select id="season"></select>
        <select id="episode"></select>
        <button onclick="play()">▶ Play</button>
      </div>

    </div>
  `;

  detectType();
}

/* BACK */
function goHome(){
  location.href = location.pathname;
}

/* DETECT MOVIE/TV */
async function detectType(){
  let res = await fetch(`https://v3-cinemeta.strem.io/meta/movie/${currentId}.json`);
  let data = await res.json();

  if(!data.meta){
    res = await fetch(`https://v3-cinemeta.strem.io/meta/series/${currentId}.json`);
    data = await res.json();
    currentType="tv";
  } else {
    currentType="movie";
  }

  document.getElementById("title").textContent = data.meta?.name || "Now Playing";

  if(currentType==="tv"){
    setupTV(data.meta.videos || []);
  } else {
    play();
  }
}

/* TV SETUP */
function setupTV(videos){
  const tv=document.getElementById("tvControls");
  const season=document.getElementById("season");

  tv.style.display="flex";
  episodesData={};

  videos.forEach(v=>{
    if(!episodesData[v.season]) episodesData[v.season]=[];
    episodesData[v.season].push(v.episode);
  });

  season.innerHTML="";
  Object.keys(episodesData).forEach(s=>{
    season.innerHTML+=`<option value="${s}">Season ${s}</option>`;
  });

  season.onchange=loadEpisodes;
  loadEpisodes();
}

function loadEpisodes(){
  const s=document.getElementById("season").value;
  const ep=document.getElementById("episode");

  ep.innerHTML="";
  (episodesData[s]||[]).forEach(e=>{
    ep.innerHTML+=`<option value="${e}">Ep ${e}</option>`;
  });
}

/* PLAY (STABLE VERSION) */
function play(){
  let url="";

  if(currentType==="movie"){
    url = `https://vidsrc.mov/embed/movie/${currentId}`;
  } else {
    const s=document.getElementById("season").value;
    const e=document.getElementById("episode").value;
    url = `https://vidsrc.mov/embed/tv/${currentId}/${s}/${e}`;
  }

  lastSource = url;
  document.getElementById("player").src = url;
}

/* OVERLAY */
function removeOverlay(){
  document.getElementById("overlay").style.display="none";
}

/* BACK PROTECTION */
window.addEventListener("blur",()=>{
  setTimeout(()=>{
    if(lastSource){
      document.getElementById("player").src = lastSource;
    }
  },800);
});
</script>

</body>
</html>
